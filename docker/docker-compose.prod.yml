services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    ports:
      - "4000:4000"
    networks:
      - lavkinkot

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://lavkinkot.ru/api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    networks:
      - lavkinkot
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - lavkinkot
    depends_on:
      - backend
      - frontend

  bot:
    build:
      context: ../bot
      dockerfile: ../docker/Dockerfile.bot
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      - lavkinkot
    depends_on:
      - backend

networks:
  lavkinkot:
    driver: bridge
