name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/lavkinkot

            echo "Pulling latest code..."
            git pull origin main

            echo "Building and restarting services..."
            docker compose -f docker/docker-compose.prod.yml build --no-cache backend frontend
            docker compose -f docker/docker-compose.prod.yml up -d --no-deps backend frontend nginx

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deploy complete!"

      - name: Notify on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Деплой успешен!
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Ошибка деплоя!
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}
            Проверь: https://github.com/${{ github.repository }}/actions
